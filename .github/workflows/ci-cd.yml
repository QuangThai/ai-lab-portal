# AI Lab Portal — CI/CD Pipeline
#
# Runs on every push and pull request to main.
# - CI: lint, type-check, unit tests, build for frontend + backend
# - E2E: Playwright tests in Ubuntu (Node 24 compatible with Playwright)
# - CD: Render Blueprint auto-deploys on main; this workflow triggers deploy hooks.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Trigger deployment"
        type: boolean
        default: false

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

# ── Concurrency: cancel stale runs on the same branch ──────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # CI — Frontend
  # ═════════════════════════════════════════════════════════════════════════
  frontend-ci:
    name: Frontend — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          node scripts/ensure-better-auth-sso-stub.mjs

      - name: Lint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'http://localhost:13100' }}

      - name: Component tests
        run: npm run test:component
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-better-auth-secret-min-32-chars-long-!!' }}
          BETTER_AUTH_URL: "http://localhost:13100"

  # ═════════════════════════════════════════════════════════════════════════
  # CI — Backend
  # ═════════════════════════════════════════════════════════════════════════
  backend-ci:
    name: Backend — lint + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ai_lab
          POSTGRES_PASSWORD: ai_lab_ci_password
          POSTGRES_DB: ai_lab_portal
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        run: python -m alembic -c alembic.ini upgrade head
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab:ai_lab_ci_password@localhost:15432/ai_lab_portal
          AI_LAB_ENVIRONMENT: ci
          AI_LAB_REDIS_URL: redis://localhost:16379/0
          AI_LAB_ADMIN_BOUNDARY_SECRET: ci-admin-boundary-secret-min-32-chars-long!!!

      - name: Lint (ruff)
        run: ruff check --output-format=github .

      - name: Type-check (pyright)
        run: pyright .

      - name: Test (pytest)
        run: pytest -x -q --timeout=60
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab:ai_lab_ci_password@localhost:15432/ai_lab_portal
          AI_LAB_ENVIRONMENT: ci
          AI_LAB_REDIS_URL: redis://localhost:16379/0
          AI_LAB_ADMIN_BOUNDARY_SECRET: ci-admin-boundary-secret-min-32-chars-long!!!
          AI_LAB_LLM_E2E_FAKE: "true"

  # ═════════════════════════════════════════════════════════════════════════
  # E2E — Playwright tests (full stack)
  # ═════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ai_lab
          POSTGRES_PASSWORD: ai_lab_e2e_password
          POSTGRES_DB: ai_lab_portal
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Backend setup ──
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: python -m alembic -c alembic.ini upgrade head
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab:ai_lab_e2e_password@localhost:15432/ai_lab_portal
          AI_LAB_ENVIRONMENT: development
          AI_LAB_REDIS_URL: redis://localhost:16379/0
          AI_LAB_ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!

      - name: Start backend
        working-directory: backend
        run: |
          nohup python -m uvicorn backend.app.main:create_app --factory --host 127.0.0.1 --port 18000 > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
          # Wait for backend to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18000/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab:ai_lab_e2e_password@localhost:15432/ai_lab_portal
          AI_LAB_ENVIRONMENT: development
          AI_LAB_REDIS_URL: redis://localhost:16379/0
          AI_LAB_ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!
          AI_LAB_LLM_E2E_FAKE: "true"

      # ── Frontend setup ──
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          node scripts/ensure-better-auth-sso-stub.mjs

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:13100

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run start -- --hostname 127.0.0.1 --port 13100 > /tmp/frontend.log 2>&1 &
          echo "Frontend PID: $!"
          # Wait for frontend
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:13100/ > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done
        env:
          ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!
          BETTER_AUTH_SECRET: e2e-better-auth-secret-min-32-chars-long!!!
          BETTER_AUTH_URL: http://localhost:13100
          BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:13100
          DATABASE_URL: postgresql://ai_lab:ai_lab_e2e_password@localhost:15432/ai_lab_portal

      # ── Playwright E2E tests ──
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:13100
          E2E_ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!
          AUTH_DATABASE_URL: postgresql://ai_lab:ai_lab_e2e_password@localhost:15432/ai_lab_portal

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7

  # ═════════════════════════════════════════════════════════════════════════
  # CD — Deploy to Render (via Blueprint sync)
  # ═════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, e2e]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && !cancelled() && !failure()

    steps:
      - name: Trigger Render Blueprint sync
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Render deploy triggered"

      - name: Wait for Render deploy (poll health endpoint)
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://ai-lab-portal-backend.onrender.com/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy after deploy"
              break
            fi
            echo "Waiting for backend... ($STATUS)"
            sleep 10
          done
