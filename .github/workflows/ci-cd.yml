# AI Lab Portal — CI/CD Pipeline
#
# Runs on every push and pull request to main.
# - CI: lint, type-check, unit tests, build for frontend + backend
# - E2E: Playwright tests via Docker Compose
# - CD: Render Blueprint auto-deploys on main via deploy hook

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Trigger deployment"
        type: boolean
        default: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

# ── Concurrency: cancel stale runs on the same branch ──────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # CI — Frontend
  # ═════════════════════════════════════════════════════════════════════════
  frontend-ci:
    name: Frontend — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          node scripts/ensure-better-auth-sso-stub.mjs

      - name: Lint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'http://localhost:13100' }}

      - name: Component tests
        run: npm run test:component
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-better-auth-secret-min-32-chars-long-!!' }}
          BETTER_AUTH_URL: "http://localhost:13100"

  # ═════════════════════════════════════════════════════════════════════════
  # CI — Backend
  # ═════════════════════════════════════════════════════════════════════════
  backend-ci:
    name: Backend — lint + typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: ai_lab_portal_test
          POSTGRES_USER: ai_lab_test
          POSTGRES_PASSWORD: ai_lab_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_lab_test -d ai_lab_portal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for services
        run: python scripts/ci-wait-for-services.py

      - name: Run database migrations
        working-directory: backend
        run: python -m alembic -c alembic.ini upgrade head
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab_test:ai_lab_test_password@localhost:5432/ai_lab_portal_test
          AI_LAB_ENVIRONMENT: testing

      - name: Run backend tests
        working-directory: backend
        run: pytest -x -q --timeout=60
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab_test:ai_lab_test_password@localhost:5432/ai_lab_portal_test
          AI_LAB_ENVIRONMENT: testing
          AI_LAB_REDIS_URL: redis://localhost:6379/0
          AI_LAB_ADMIN_BOUNDARY_SECRET: ci-admin-boundary-secret-min-32-chars-long!!!
          AI_LAB_LLM_E2E_FAKE: "true"

  # ═════════════════════════════════════════════════════════════════════════
  # E2E — Playwright tests (full stack via Docker Compose)
  # ═════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # ── Backend setup ──
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── Frontend setup ──
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          node scripts/ensure-better-auth-sso-stub.mjs

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # ── Start infra with Docker Compose ──
      - name: Start Docker services
        env:
          POSTGRES_HOST_PORT: 5432
          REDIS_HOST_PORT: 6379
        run: |
          docker compose up -d postgres redis
          timeout 120 bash -c 'until docker compose ps postgres | grep healthy; do sleep 2; done'
          timeout 120 bash -c 'until docker compose ps redis | grep healthy; do sleep 2; done'

      - name: Run migrations
        working-directory: backend
        run: python -m alembic -c alembic.ini upgrade head
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab:ai_lab_dev_password@localhost:5432/ai_lab_portal
          AI_LAB_ENVIRONMENT: development

      - name: Start backend
        env:
          AI_LAB_DATABASE_URL: postgresql+psycopg://ai_lab:ai_lab_dev_password@localhost:5432/ai_lab_portal
          AI_LAB_ENVIRONMENT: development
          AI_LAB_REDIS_URL: redis://localhost:6379/0
          AI_LAB_ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!
          AI_LAB_LLM_E2E_FAKE: "true"
        run: |
          nohup python -m uvicorn backend.app.main:create_app --factory --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done

      - name: Build + start frontend
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://ai_lab:ai_lab_dev_password@localhost:5432/ai_lab_portal
          BACKEND_INTERNAL_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          BETTER_AUTH_SECRET: e2e-better-auth-secret-min-32-chars-long!!!
          BETTER_AUTH_URL: http://localhost:3000
          BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3000
          ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!
        run: |
          npm run build
          nohup npm run start -- --hostname 0.0.0.0 --port 3000 > /tmp/frontend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          AUTH_DATABASE_URL: postgresql://ai_lab:ai_lab_dev_password@localhost:5432/ai_lab_portal
          ADMIN_BOUNDARY_SECRET: e2e-admin-boundary-secret-min-32-chars-long!!
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ═════════════════════════════════════════════════════════════════════════
  # CD — Deploy to Render
  # ═════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, e2e]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && !cancelled() && !failure()

    steps:
      - name: Trigger Render Blueprint sync
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Render deploy triggered"
